<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            font-size: 2.5em;
        }
        
        .solutions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        
        .solution-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .solution-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }
        
        .solution-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .solution-card a {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .solution-card a:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Exam Solutions</h1>
        
        <div class="solution-card">
            <h2>Computer Science I</h2>
            <a href="https://yash-pohankar.github.io/question-answers/CS11_I_Answers.html">View Solutions</a>
        </div>
        
        <div class="solution-card">
            <h2>Computer Science II</h2>
            <a href="https://yash-pohankar.github.io/question-answers/CS11_II_Answers.html">View Solutions</a>
        </div>

         <div class="solution-card">
                <h2>Physics</h2>
                <a href="https://yash-pohankar.github.io/question-answers/physics-11.html">View Solutions</a>
            </div>

        <div class="solutions-grid">
            <div class="solution-card">
                <h2>Mathematics (Coming Soon)</h2>
                <a href="https://yash-pohankar.github.io/question-answers/Maths_Answers.html">View Solutions</a>
            </div>
            
            <div class="solution-card">
                <h2>Chemistry (Coming Soon)</h2>
                <a href="#">View Solutions</a>
            </div>
            
    <div class="solution-card">
                <h2>English (Coming Soon)</h2>
                <a href="#">View Solutions</a>
            </div>
            
        </div>
    </div>
</body>
</html>
